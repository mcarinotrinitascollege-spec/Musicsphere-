<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere </title>
    <style>
        :root { 
            --lavender-vibrant: #9d7aff; 
            --bg: #05010a; 
            --disk-rot: 0deg; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        .video-bg { position: absolute; inset: -5%; width: 110%; height: 110%; object-fit: cover; display: none; filter: blur(50px) brightness(0.45); z-index: 0; opacity: 0.85; pointer-events: none; transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1); }
        .video-card-inner { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); filter: brightness(0.35) blur(10px); pointer-events: none; }
        
        .card { position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px; background: rgba(15, 8, 25, 0.9); border-radius: 50px; padding: 25px; display: flex; flex-direction: column; align-items: center; border: 1.5px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.8); overflow: hidden; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Updated Breathing Animation with Inhaling Blur */
        @keyframes titleBreath { 
            0%, 100% { opacity: 0.3; transform: scale(1); filter: blur(0px); } 
            50% { opacity: 0.9; transform: scale(1.03); filter: blur(1.8px); } 
        }
        .headtitle { position: absolute; top: 45px; left: 30px; font-size: 0.75rem; font-weight: 900; letter-spacing: 6px; color: #fff; text-transform: uppercase; z-index: 25; animation: titleBreath 4.5s ease-in-out infinite; }
        
        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 35px; z-index: 30; padding-top: 10px; gap: 10px; }
        #stealthToggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; z-index: 35; }
        #listToggle { background: none; border: none; cursor: pointer; opacity: 0.5; padding: 8px; }
        
        .disk-wrapper { position: relative; width: 250px; height: 250px; flex-shrink: 0; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; z-index: 20; }
        #cdAssembly { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(157, 122, 255, 0.08) 0%, transparent 80%); cursor: grab; z-index: 5; transform: rotate(var(--disk-rot)); }
        
        #prog-svg { position: absolute; width: 260px; height: 260px; pointer-events: none; z-index: 6; transform: rotate(-90deg); }
        #prog-ring { fill: none; stroke: url(#lavenderTipGrad); stroke-width: 4; stroke-dasharray: 785.4; stroke-dashoffset: 785.4; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear, opacity 0.4s ease; }
        .scrubbing #prog-ring { transition: none !important; }

        #curved-text-svg { position: absolute; inset: 0; pointer-events: none; z-index: 10; transform: rotate(calc(var(--disk-rot) - 90deg)); transition: opacity 0.4s ease; }
        .curved-title { font-size: 7px; font-weight: 900; fill: #ffffff; text-transform: uppercase; letter-spacing: 3px; }
        #time-display { color: #fff; font-size: 1.6rem; opacity: 0; font-family: monospace; transition: opacity 0.2s; z-index: 12;}
        
        canvas { width: 100%; height: 70px; margin-bottom: 15px; z-index: 20; } 
        .load-btn { z-index: 20; font-size: 0.6rem; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.15); padding: 12px 35px; border-radius: 100px; cursor: pointer; margin-bottom: 30px; letter-spacing: 4px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); }
        
        .vol-container { width: 200px; height: 10px; z-index: 100; margin-bottom: 35px; cursor: pointer; position: relative; }
        .vol-track { width: 100%; height: 100%; background: rgba(255,255,255,0.05); border-radius: 20px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
        .vol-fill { position: absolute; left: 0; top: 0; height: 100%; width: 70%; background: linear-gradient(to right, #ffffff, var(--lavender-vibrant)); border-radius: 20px; }
        
        .controls { display: flex; align-items: center; gap: 30px; margin-bottom: 20px; z-index: 100; }
        .icon-btn { background: none; border: none; width: 25px; height: 25px; fill: white; opacity: 0.4; cursor: pointer; }
        .play-btn { width: 65px; height: 65px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
        
        #playlist-panel { position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(50px) saturate(180%); -webkit-backdrop-filter: blur(50px) saturate(180%); z-index: 5000; transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px 20px; border-radius: 40px 40px 0 0; border-top: 1px solid rgba(255,255,255,0.1); }
        #playlist-panel.open { bottom: 0; }
        .track-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; margin-bottom: 8px; border-radius: 15px; color: #fff; font-size: 0.8rem; background: rgba(255,255,255,0.05); cursor: pointer; }
        .del-btn { background: none; border: none; padding: 8px; opacity: 0.3; cursor: pointer; display: flex; align-items: center; }
        .del-btn svg { fill: none; stroke: #fff; stroke-width: 1.5; width: 18px; height: 18px; }

        .card.is-expanded { width: 90vw; height: calc(90vw * 9 / 16); max-width: 1000px; max-height: 562px; border-radius: 30px; padding: 0; z-index: 2000; }
        .card.is-expanded .video-card-inner { filter: brightness(1) blur(0px); opacity: 1; }
        .card.is-expanded :not(.video-card-inner) { opacity: 0 !important; pointer-events: none !important; }
        .card.is-stealth .video-card-inner { filter: brightness(0.3) blur(0px); opacity: 1; }
        .card.is-stealth .headtitle, .card.is-stealth canvas, .card.is-stealth .load-btn, .card.is-stealth .vol-container, .card.is-stealth #listToggle, .card.is-stealth .disk-wrapper, .card.is-stealth .controls { opacity: 0; pointer-events: none; }
    </style>
</head>
<body id="mainBody">

<video id="bgVideo" class="video-bg" loop muted playsinline></video>

<div class="card" id="playerCard">
    <video id="cardVideo" class="video-card-inner" loop playsinline></video>
    <div class="headtitle">MUSICSPHERE</div>
    <div class="header">
        <button id="stealthToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button id="listToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    
    <div class="disk-wrapper" id="diskArea">
        <div id="cdAssembly"></div>
        <svg id="prog-svg" viewBox="0 0 260 260">
            <defs>
                <linearGradient id="lavenderTipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#ffffff; stop-opacity:1" />
                    <stop offset="85%" style="stop-color:#ffffff; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:var(--lavender-vibrant); stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle id="prog-ring" cx="130" cy="130" r="125"></circle>
        </svg>
        <svg id="curved-text-svg" viewBox="0 0 200 200"><defs><path id="diskPath" d="M 100, 100 m -85, 0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"></path></defs><text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">AWAITING INPUT</textPath></text></svg>
        <div style="position:absolute; text-align:center; pointer-events:none;"><div id="time-display">0:00</div></div>
    </div>

    <canvas id="viz"></canvas>
    <label class="load-btn">INSERT MEDIA<input type="file" id="audIn" accept="audio/*,video/mp4" multiple style="display:none"></label>
    
    <div class="vol-container" id="volHitbox">
        <div class="vol-track"><div class="vol-fill" id="vFil"></div></div>
    </div>

    <div class="controls">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="30" height="30" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    
    <div id="playlist-panel"><div id="track-list" style="overflow-y: auto; height: 100%;"></div></div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player'), cardVideo = document.getElementById('cardVideo'), bgVideo = document.getElementById('bgVideo');
    const canvas = document.getElementById('viz'), ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const songLabel = document.getElementById('songLabel'), timeDisplay = document.getElementById('time-display'), progRing = document.getElementById('prog-ring'), textSvg = document.getElementById('curved-text-svg');
    const playIcon = document.getElementById('playIcon'), vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox'), playerCard = document.getElementById('playerCard');
    const playlistPanel = document.getElementById('playlist-panel'), trackListUI = document.getElementById('track-list'), stealthToggle = document.getElementById('stealthToggle');

    let playlist = [], currentIndex = 0, audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0;
    let audioSourceNode, videoSourceNode, masterGain;

    const getActive = () => playlist[currentIndex]?.type === 'video' ? cardVideo : audio;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            masterGain = audioCtx.createGain();
            audioSourceNode = audioCtx.createMediaElementSource(audio);
            videoSourceNode = audioCtx.createMediaElementSource(cardVideo);
            audioSourceNode.connect(masterGain); videoSourceNode.connect(masterGain);
            masterGain.connect(analyser); analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    function updateProgressUI(time, duration) {
        if(!duration) return;
        const pct = Math.max(0, Math.min(1, time / duration));
        const circ = 785.4;
        progRing.style.strokeDashoffset = circ - (pct * circ);
        const fadeStart = 0.96;
        const opacityVal = pct > fadeStart ? (1 - ((pct - fadeStart) / (1 - fadeStart))).toString() : "1";
        progRing.style.opacity = opacityVal; textSvg.style.opacity = opacityVal;
        timeDisplay.textContent = Math.floor(time/60) + ":" + String(Math.floor(time%60)).padStart(2,'0');
    }

    function draw() {
        requestAnimationFrame(draw);
        const active = getActive();
        if (!active || !active.src || active.paused || isDragging) return;
        rotation += 0.3; document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`); 
        updateProgressUI(active.currentTime, active.duration);
        
        if (analyser && audioCtx.state === 'running') {
            analyser.getByteFrequencyData(dataArray);
            const heavyBass = (dataArray[0] + dataArray[1]) / 2;
            let glowTrigger = heavyBass > 190 ? (heavyBass - 190) / 65 : 0;
            cdAssembly.style.boxShadow = `0 0 ${15 + (glowTrigger * 35)}px rgba(157, 122, 255, ${0.1 + (glowTrigger * 0.5)})`;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // NEW: White to Lavender Vertical Gradient for Bars
            const barGrad = ctx.createLinearGradient(0, canvas.height, 0, 0);
            barGrad.addColorStop(0, '#ffffff');
            barGrad.addColorStop(1, '#9d7aff');

            for (let i = 0; i < 45; i++) {
                const centerDist = Math.abs(i - 22) / 22;
                let val = (dataArray[Math.floor((1 - centerDist) * 35)] / 255) * canvas.height * (0.2 + (Math.pow(centerDist, 2) * 0.8));
                ctx.fillStyle = barGrad;
                ctx.beginPath(); ctx.roundRect(i * (canvas.width/45), canvas.height - val, (canvas.width/45)-2, val, 15); ctx.fill();
            }
        }
    }
    draw();

    function loadTrack(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const track = playlist[currentIndex];
        audio.pause(); cardVideo.pause();
        const active = getActive(); songLabel.textContent = track.name.toUpperCase(); textSvg.style.opacity = "1";
        active.src = track.url; active.load();
        
        if(track.type === 'video') { 
            cardVideo.style.opacity = '1'; bgVideo.src = track.url; bgVideo.style.display = 'block'; bgVideo.play(); 
            stealthToggle.style.display = 'block'; 
        } else { 
            cardVideo.style.opacity = '0'; bgVideo.style.display = 'none'; 
            stealthToggle.style.display = 'none'; 
            playerCard.classList.remove('is-stealth', 'is-expanded'); 
        }
        active.play().then(() => playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>').catch(()=>{});
    }

    function renderPlaylist() {
        trackListUI.innerHTML = "";
        playlist.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `<span style="flex: 1;">${t.name}</span><button class="del-btn"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`;
            div.onclick = (e) => {
                if(e.target.closest('.del-btn')) {
                    e.stopPropagation(); playlist.splice(i, 1); renderPlaylist();
                    if(playlist.length === 0) { audio.src=""; cardVideo.src=""; songLabel.textContent="AWAITING INPUT"; stealthToggle.style.display = 'none'; }
                    else if(i === currentIndex) loadTrack(currentIndex % playlist.length);
                } else { loadTrack(i); playlistPanel.classList.remove('open'); }
            };
            trackListUI.appendChild(div);
        });
    }

    [audio, cardVideo].forEach(el => el.onended = () => { if(playlist.length > 0) loadTrack(currentIndex + 1); });

    document.getElementById('audIn').onchange = (e) => {
        Array.from(e.target.files).forEach(f => playlist.push({ name: f.name.split('.')[0], url: URL.createObjectURL(f), type: f.type.startsWith('video') ? 'video' : 'audio' }));
        if(playlist.length > 0) { initAudio(); loadTrack(playlist.length - e.target.files.length); }
        renderPlaylist();
    };

    document.getElementById('playBtn').onclick = async (e) => { e.stopPropagation(); await initAudio(); const a = getActive(); if(!a.src) return; if(a.paused) { a.play(); bgVideo.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; } else { a.pause(); bgVideo.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; } };
    document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex - 1); };
    document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex + 1); };
    document.getElementById('listToggle').onclick = (e) => { e.stopPropagation(); playlistPanel.classList.toggle('open'); };
    stealthToggle.onclick = (e) => { e.stopPropagation(); playerCard.classList.toggle('is-stealth'); };

    function handleVol(e) {
        const r = volHitbox.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e;
        const pct = Math.max(0, Math.min(1, (p.clientX - r.left) / r.width));
        vFil.style.width = (pct * 100) + '%'; audio.volume = pct; cardVideo.volume = pct;
    }
    volHitbox.addEventListener('mousedown', (e) => { e.stopPropagation(); handleVol(e); document.onmousemove = handleVol; document.onmouseup = () => document.onmousemove = null; });
    volHitbox.addEventListener('touchstart', (e) => { e.stopPropagation(); handleVol(e); }, {passive:false});
    volHitbox.addEventListener('touchmove', handleVol, {passive:false});

    function getAngle(e) { const r = cdAssembly.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e; return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI; }
    const startScrub = (e) => { if(!getActive().src) return; isDragging = true; lastAngle = getAngle(e); getActive().pause(); bgVideo.pause(); timeDisplay.style.opacity = '1'; document.getElementById('mainBody').classList.add('scrubbing'); };
    const moveScrub = (e) => {
        if(!isDragging) return;
        const a = getActive(); const ang = getAngle(e); let d = ang - lastAngle; if(d > 180) d -= 360; if(d < -180) d += 360;
        rotation += d; document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`);
        let newTime = Math.max(0, Math.min(a.duration - 0.1, a.currentTime + (d * 0.15)));
        a.currentTime = newTime; bgVideo.currentTime = newTime; updateProgressUI(newTime, a.duration); lastAngle = ang;
    };
    cdAssembly.addEventListener('mousedown', startScrub); window.addEventListener('mousemove', moveScrub); window.addEventListener('mouseup', () => { if(isDragging) { isDragging = false; timeDisplay.style.opacity = '0'; getActive().play(); bgVideo.play(); document.getElementById('mainBody').classList.remove('scrubbing'); } });
    cdAssembly.addEventListener('touchstart', startScrub, {passive:false}); window.addEventListener('touchmove', moveScrub, {passive:false}); window.addEventListener('touchend', () => { if(isDragging) { isDragging = false; timeDisplay.style.opacity = '0'; getActive().play(); bgVideo.play(); document.getElementById('mainBody').classList.remove('scrubbing'); } });

    playerCard.onclick = (e) => {
        if(e.target.closest('button') || e.target.closest('.vol-container') || e.target.closest('#cdAssembly')) return;
        if(playerCard.classList.contains('is-expanded')) playerCard.classList.remove('is-expanded');
        else if(playerCard.classList.contains('is-stealth')) playerCard.classList.remove('is-stealth');
    };
    playerCard.oncontextmenu = (e) => { e.preventDefault(); if(playlist[currentIndex]?.type === 'video') playerCard.classList.add('is-expanded'); };
    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
