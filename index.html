<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere v3.6 - Tinted Pro</title>
    <style>
        :root { --accent: #9400D3; --bg: #000; --disk-rot: 0deg; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; background: #000; 
            display: flex; align-items: center; justify-content: center; 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden; touch-action: none; 
        }

        /* THE MASTER VIDEO ENGINE */
        #masterVideo {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1; filter: brightness(0.4) blur(40px);
        }

        /* FULL SCREEN STATE */
        body.is-zoomed #masterVideo {
            z-index: 1000; filter: brightness(1) blur(0px); object-fit: contain; background: #000;
        }

        .card { 
            position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 660px;
            /* LIMO TINT WINDOW */
            background: rgba(0, 0, 0, 0.75); 
            border-radius: 50px; padding: 30px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); overflow: hidden;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }

        /* Background Video Inside Player */
        .card-video-wrap {
            position: absolute; inset: 0; z-index: -1; overflow: hidden;
        }
        .card-video-wrap::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.6) 100%);
        }

        .headtitle { font-size: 0.6rem; font-weight: 900; letter-spacing: 5px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 10px; }

        .disk-wrapper { 
            position: relative; width: 230px; height: 230px; margin: 40px 0;
            display: flex; align-items: center; justify-content: center;
        }
        #cdAssembly { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 80%);
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; z-index: 5;
            transform: rotate(var(--disk-rot)); will-change: transform;
        }

        #curved-text-svg { position: absolute; inset: -10px; pointer-events: none; z-index: 10; }
        .curved-title { font-size: 6px; font-weight: 900; fill: rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 3px; }

        #time-display { position: absolute; color: #fff; font-size: 1.4rem; opacity: 0; font-family: monospace; z-index: 20; pointer-events: none; }

        canvas { width: 100%; height: 80px; margin-bottom: 20px; opacity: 0.8; }

        .vol-wrap { width: 100%; padding: 5px 0; margin-bottom: 30px; }
        .vol-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; }
        .vol-fill { position: absolute; left: 0; top: 0; height: 100%; background: #fff; border-radius: 3px; width: 70%; }
        
        .controls { display: flex; align-items: center; gap: 40px; margin-bottom: 20px; }
        .icon-btn { background: none; border: none; width: 24px; height: 24px; fill: white; opacity: 0.3; }
        .play-btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        #exitBtn { 
            position: fixed; top: 30px; right: 30px; z-index: 2000; display: none; 
            padding: 12px 24px; border-radius: 30px; background: #fff; color: #000; 
            font-size: 0.7rem; font-weight: 900; border: none; letter-spacing: 1px;
        }

        .input-hint { font-size: 0.5rem; color: rgba(255,255,255,0.2); margin-top: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<video id="masterVideo" loop playsinline crossorigin="anonymous"></video>

<button id="exitBtn">MINIMIZE MV</button>

<div class="card" id="playerCard">
    <div class="card-video-wrap"></div> <div class="headtitle">MUSICSPHERE</div>
    
    <div class="disk-wrapper" id="diskArea">
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200">
            <defs><path id="diskPath" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0"></path></defs>
            <text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">TAP TO LOAD MP4</textPath></text>
        </svg>
        <div id="time-display">0:00</div>
    </div>

    <canvas id="viz"></canvas>

    <div class="vol-wrap" id="volHitbox">
        <div class="vol-track"><div class="vol-fill" id="vFil"></div></div>
    </div>

    <div class="controls">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="30" height="30" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>

    <label class="input-hint">HOLD DISK FOR FULL MV<input type="file" id="audIn" accept="video/mp4" style="display:none"></label>
</div>

<script>
    const video = document.getElementById('masterVideo');
    const canvas = document.getElementById('viz'), ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const songLabel = document.getElementById('songLabel'), timeDisplay = document.getElementById('time-display');
    const playIcon = document.getElementById('playIcon'), vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox');
    const exitBtn = document.getElementById('exitBtn');

    let audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0, pressTimer;

    async function startEngine() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            const source = audioCtx.createMediaElementSource(video);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            render();
        }
    }

    function render() {
        if (!video.paused && !isDragging) { 
            rotation += 0.4; 
            cdAssembly.style.transform = `rotate(${rotation}deg)`;
            document.getElementById('curved-text-svg').style.transform = `rotate(${rotation - 90}deg)`;
        }

        if (analyser && !video.paused) {
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const bars = 40, barW = 3, gap = (canvas.width - (bars * barW)) / (bars - 1);
            ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
            
            for (let i = 0; i < bars; i++) {
                const x = (i - (bars-1)/2) / ((bars-1)/2);
                const uCurve = Math.pow(x, 2); 
                const dIdx = Math.floor((1 - Math.abs(x)) * 20);
                const h = Math.max(4, (dataArray[dIdx] / 255) * canvas.height * (0.2 + uCurve * 0.8));
                ctx.beginPath();
                ctx.roundRect(i * (barW + gap), canvas.height - h, barW, h, 4);
                ctx.fill();
            }
        }
        requestAnimationFrame(render);
    }

    // LOAD FILE
    document.getElementById('audIn').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            songLabel.textContent = file.name.toUpperCase();
            video.play();
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            startEngine();
        }
    };

    // REVEAL MV LOGIC
    cdAssembly.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => {
            if(!isDragging) {
                document.body.classList.add('is-zoomed');
                exitBtn.style.display = 'block';
            }
        }, 800);
    });
    cdAssembly.addEventListener('touchend', () => clearTimeout(pressTimer));

    exitBtn.onclick = () => {
        document.body.classList.remove('is-zoomed');
        exitBtn.style.display = 'none';
    };

    // PLAY/PAUSE
    document.getElementById('playBtn').onclick = () => {
        if(video.paused) { video.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
        else { video.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
    };

    // DISK SEEKING
    function getAngle(e) {
        const r = cdAssembly.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI;
    }

    cdAssembly.addEventListener('mousedown', (e) => { isDragging = true; lastAngle = getAngle(e); video.pause(); timeDisplay.style.opacity = '1'; });
    window.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        const angle = getAngle(e);
        let delta = angle - lastAngle;
        if(delta > 180) delta -= 360; if(delta < -180) delta += 360;
        rotation += delta;
        cdAssembly.style.transform = `rotate(${rotation}deg)`;
        video.currentTime = Math.max(0, Math.min(video.duration - 0.1, video.currentTime + (delta * 0.1)));
        timeDisplay.textContent = Math.floor(video.currentTime/60) + ":" + String(Math.floor(video.currentTime%60)).padStart(2,'0');
        lastAngle = angle;
    });
    window.addEventListener('mouseup', () => { if(isDragging) { isDragging = false; video.play(); timeDisplay.style.opacity = '0'; } });

    // VOLUME
    volHitbox.onclick = (e) => {
        const r = volHitbox.getBoundingClientRect();
        const pr = (e.clientX - r.left) / r.width;
        vFil.style.width = (pr * 100) + '%';
        video.volume = pr;
    };

    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
