<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere Pro | Stealth Sync</title>
    <style>
        :root { --accent: #b19cd9; --bg: #05010a; --disk-rot: 0deg; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Background & Video Layers */
        .video-bg { position: absolute; inset: -5%; width: 110%; height: 110%; object-fit: cover; display: none; filter: blur(20px) brightness(1.1); z-index: 0; opacity: 0.5; pointer-events: none; }
        .video-card-inner { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0; transition: all 0.8s ease; filter: brightness(0.4) blur(5px); pointer-events: none; }
        
        /* Main Card */
        .card { position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px; background: rgba(15, 8, 25, 0.9); border-radius: 50px; padding: 25px; display: flex; flex-direction: column; align-items: center; border: 1.5px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; }

        /* Stealth Mode: MP4 Only */
        .card.is-stealth .video-card-inner { filter: brightness(0.3) blur(0px); opacity: 1; }
        .card.is-stealth .headtitle, .card.is-stealth canvas, .card.is-stealth .load-btn, .card.is-stealth .vol-container, .card.is-stealth #listToggle, .card.is-stealth .disk-wrapper, .card.is-stealth .controls { opacity: 0; pointer-events: none; }
        
        /* Expanded Logic */
        .card.is-expanded { width: 100vw; height: 100vh; max-width: none; border-radius: 0; }
        .card.is-expanded .video-card-inner { filter: brightness(1) blur(0px); opacity: 1; }
        .card.is-expanded :not(.video-card-inner) { opacity: 0 !important; pointer-events: none; }

        .headtitle { position: absolute; top: 45px; left: 30px; font-size: 0.75rem; font-weight: 900; letter-spacing: 6px; color: #fff; text-transform: uppercase; z-index: 25; opacity: 0.5; }
        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 35px; z-index: 20; padding-top: 10px; gap: 10px; }
        
        /* Icon Styling */
        #stealthToggle { display: none; background: none; border: none; cursor: pointer; opacity: 0.5; padding: 8px; z-index: 30; }
        #listToggle { background: none; border: none; cursor: pointer; opacity: 0.5; padding: 8px; }

        .disk-wrapper { position: relative; width: 250px; height: 250px; flex-shrink: 0; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; z-index: 20; }
        #cdAssembly { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(230, 224, 255, 0.08) 0%, transparent 75%); transform: rotate(var(--disk-rot)); box-shadow: 0 0 20px rgba(230, 224, 255, 0.12); cursor: grab; }
        #curved-text-svg { position: absolute; inset: 0; pointer-events: none; z-index: 10; transform: rotate(calc(var(--disk-rot) - 90deg)); }
        .curved-title { font-size: 7px; font-weight: 900; fill: rgba(230, 224, 255, 0.3); text-transform: uppercase; letter-spacing: 3px; }
        
        #time-display { position: absolute; color: #fff; font-size: 1.6rem; opacity: 0; font-family: monospace; z-index: 15; pointer-events: none; }

        canvas { width: 100%; height: 60px; margin-bottom: 20px; z-index: 20; } 
        .load-btn { z-index: 20; font-size: 0.6rem; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 10px 30px; border-radius: 50px; cursor: pointer; margin-bottom: 30px; letter-spacing: 4px; background: rgba(0,0,0,0.1); }
        
        .vol-container { width: 200px; height: 6px; z-index: 40; margin-bottom: 40px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .vol-fill { height: 100%; width: 70%; background: #b19cd9; }
        
        .controls { display: flex; align-items: center; gap: 30px; margin-bottom: 20px; z-index: 30; }
        .icon-btn { background: none; border: none; width: 25px; height: 25px; fill: white; opacity: 0.4; cursor: pointer; }
        .play-btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }

        #playlist-panel { position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%; background: rgba(10, 5, 15, 0.95); backdrop-filter: blur(40px); border-radius: 40px 40px 0 0; z-index: 1000; transition: bottom 0.5s ease; padding: 30px 20px; }
        #playlist-panel.open { bottom: 0; }
        .track-item { padding: 15px; margin-bottom: 8px; border-radius: 12px; color: #fff; background: rgba(255,255,255,0.05); font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<video id="bgVideo" class="video-bg" loop muted playsinline></video>
<div class="card" id="playerCard">
    <video id="cardVideo" class="video-card-inner" loop playsinline></video>
    <div class="headtitle">MUSICSPHERE</div>
    <div class="header">
        <button id="stealthToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button id="listToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    <div class="disk-wrapper">
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200"><defs><path id="diskPath" d="M 100, 100 m -85, 0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"></path></defs><text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">AWAITING INPUT</textPath></text></svg>
        <div id="time-display">0:00</div>
    </div>
    <canvas id="viz"></canvas>
    <label class="load-btn">INSERT MEDIA<input type="file" id="audIn" accept="audio/*,video/mp4" multiple style="display:none"></label>
    <div class="vol-container" id="volHitbox"><div class="vol-fill" id="vFil"></div></div>
    <div class="controls">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="25" height="25" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    <div id="playlist-panel"><div id="track-list" style="overflow-y: auto; height: 100%;"></div></div>
</div>
<audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player'), cardVideo = document.getElementById('cardVideo'), bgVideo = document.getElementById('bgVideo');
    const canvas = document.getElementById('viz'), ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const songLabel = document.getElementById('songLabel'), timeDisplay = document.getElementById('time-display');
    const playIcon = document.getElementById('playIcon'), vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox');
    const playerCard = document.getElementById('playerCard'), stealthToggle = document.getElementById('stealthToggle');

    let playlist = [], currentIndex = 0, audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0;

    const getActive = () => playlist[currentIndex]?.type === 'video' ? cardVideo : audio;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128; 
            const sourceA = audioCtx.createMediaElementSource(audio);
            const sourceV = audioCtx.createMediaElementSource(cardVideo);
            sourceA.connect(analyser); sourceV.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
    }

    function draw() {
        requestAnimationFrame(draw);
        const active = getActive();
        if (!active || active.paused || isDragging) return;

        rotation += 0.3; 
        document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`); 

        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barW = (canvas.width / dataArray.length) * 2;
            for (let i = 0; i < dataArray.length; i++) {
                let val = (dataArray[i] / 255) * canvas.height;
                ctx.fillStyle = `rgba(230, 224, 255, 0.3)`;
                ctx.fillRect(i * barW, canvas.height - val, barW - 1, val);
            }
        }
    }
    draw();

    // Interaction Handlers
    let pressTimer;
    playerCard.onmousedown = playerCard.ontouchstart = () => { if(playlist[currentIndex]?.type==='video') pressTimer = setTimeout(()=>playerCard.classList.add('is-expanded'), 800); };
    window.onmouseup = window.ontouchend = () => clearTimeout(pressTimer);
    playerCard.onclick = () => playerCard.classList.remove('is-expanded');

    function loadTrack(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const track = playlist[currentIndex];
        
        audio.pause(); cardVideo.pause();
        audio.src = cardVideo.src = "";
        
        const active = getActive();
        songLabel.textContent = track.name.toUpperCase();
        active.src = track.url;
        active.load();

        if(track.type === 'video') {
            cardVideo.style.opacity = '1'; 
            bgVideo.src = track.url; 
            bgVideo.style.display = 'block'; 
            bgVideo.play().catch(()=>{});
            stealthToggle.style.display = 'block'; // Available for MP4
        } else {
            cardVideo.style.opacity = '0'; 
            bgVideo.style.display = 'none'; 
            stealthToggle.style.display = 'none'; // Hidden for MP3
            playerCard.classList.remove('is-stealth');
        }
        active.play().then(()=>playIcon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>').catch(()=>{});
    }

    document.getElementById('audIn').onchange = (e) => {
        Array.from(e.target.files).forEach(f => playlist.push({ name: f.name.split('.')[0], url: URL.createObjectURL(f), type: f.type.startsWith('video') ? 'video' : 'audio' }));
        if(playlist.length > 0) {
            loadTrack(playlist.length - e.target.files.length);
            const list = document.getElementById('track-list'); list.innerHTML = "";
            playlist.forEach((t, i) => {
                const d = document.createElement('div'); d.className = 'track-item'; d.textContent = t.name;
                d.onclick = () => { loadTrack(i); document.getElementById('playlist-panel').classList.remove('open'); };
                list.appendChild(d);
            });
        }
    };

    document.getElementById('playBtn').onclick = async (e) => {
        e.stopPropagation(); await initAudio(); const a = getActive(); if(!a.src) return;
        if(a.paused) { a.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
        else { a.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
    };

    function getAngle(e) {
        const r = cdAssembly.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e;
        return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI;
    }
    cdAssembly.onmousedown = cdAssembly.ontouchstart = (e) => { isDragging = true; lastAngle = getAngle(e); timeDisplay.style.opacity = '1'; };
    window.onmousemove = window.ontouchmove = (e) => {
        if(!isDragging) return;
        const angle = getAngle(e); let delta = angle - lastAngle;
        if(delta > 180) delta -= 360; if(delta < -180) delta += 360;
        rotation += delta;
        document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`);
        const a = getActive(); a.currentTime = Math.max(0, Math.min(a.duration, a.currentTime + (delta * 0.1)));
        timeDisplay.textContent = Math.floor(a.currentTime/60)+":"+String(Math.floor(a.currentTime%60)).padStart(2,'0');
        lastAngle = angle;
    };
    window.onmouseup = window.ontouchend = () => { if(isDragging) { isDragging = false; timeDisplay.style.opacity = '0'; } };

    document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex - 1); };
    document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex + 1); };
    document.getElementById('listToggle').onclick = (e) => { e.stopPropagation(); document.getElementById('playlist-panel').classList.toggle('open'); };
    stealthToggle.onclick = (e) => { e.stopPropagation(); playerCard.classList.toggle('is-stealth'); };

    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
