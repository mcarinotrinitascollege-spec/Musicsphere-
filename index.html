<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere v3.5 - Tinted Edition</title>
    <style>
        :root { --accent: #9400D3; --bg: #000; --disk-rot: 0deg; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            font-family: sans-serif; overflow: hidden; touch-action: none; 
        }

        /* Ambient Video Background */
        .video-bg { position: absolute; inset: -5%; width: 110%; height: 110%; object-fit: cover; display: none; filter: blur(50px) brightness(0.8); z-index: 0; opacity: 0.7; pointer-events: none; }
        
        /* Full Screen MV Reveal */
        .video-fs { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: contain; display: none; z-index: 5000; background: #000; opacity: 0; transition: opacity 0.5s ease; }
        
        .backlit-glow { position: absolute; width: 400px; height: 550px; background: var(--accent); filter: blur(120px); opacity: 0.1; border-radius: 50%; z-index: 1; }

        .card { 
            position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px;
            /* LIMO TINT EFFECT */
            background: linear-gradient(165deg, rgba(10, 5, 15, 0.95) 0%, rgba(20, 20, 25, 0.88) 100%); 
            border-radius: 50px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 80px rgba(0,0,0,0.9); overflow: hidden;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .headtitle {
            position: absolute; top: 45px; left: 30px;
            font-size: 0.65rem; font-weight: 900; letter-spacing: 6px; color: rgba(255,255,255,0.4);
            text-transform: uppercase; z-index: 25;
        }

        body.is-zoomed .video-fs { display: block; opacity: 1; }
        
        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 30px; z-index: 20; padding-top: 10px; gap: 10px; }
        .icon-nav { background: none; border: none; cursor: pointer; opacity: 0.3; padding: 8px; }

        .disk-wrapper { 
            position: relative; width: 240px; height: 240px; flex-shrink: 0; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center; z-index: 20;
        }
        #cdAssembly { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 75%);
            border: 1px solid rgba(255, 255, 255, 0.08); cursor: pointer; z-index: 5;
            transform: rotate(var(--disk-rot)); will-change: transform;
        }

        #curved-text-svg { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .curved-title { font-size: 6.5px; font-weight: 900; fill: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 3px; }

        .hud-center { position: absolute; z-index: 12; pointer-events: none; text-align: center; }
        #time-display { color: #fff; font-size: 1.6rem; opacity: 0; font-family: monospace; text-shadow: 0 0 20px var(--accent); }

        canvas { width: 100%; height: 90px; margin-bottom: 20px; opacity: 0.6; z-index: 20; } 

        .load-btn { font-size: 0.55rem; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 30px; border-radius: 50px; cursor: pointer; margin-bottom: 25px; letter-spacing: 4px; opacity: 0.5; }

        .vol-wrap { width: 100%; padding: 5px 0; cursor: pointer; z-index: 40; margin-bottom: 25px; }
        .vol-track { height: 24px; background: rgba(0,0,0,0.4); border-radius: 12px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .vol-fill { position: absolute; left: 0; top: 0; height: 100%; background: #fff; width: 70%; pointer-events: none; opacity: 0.2; }
        
        .controls { display: flex; align-items: center; gap: 35px; margin-bottom: 30px; z-index: 30; }
        .icon-btn { background: none; border: none; width: 25px; height: 25px; fill: white; opacity: 0.25; }
        .play-btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }

        #exitBtn { 
            position: fixed; top: 30px; right: 30px; z-index: 6000; display: none; padding: 10px 20px; border-radius: 30px; 
            background: rgba(0,0,0,0.8); color: white; border: 1px solid rgba(255,255,255,0.2); 
            font-size: 0.6rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<video id="masterVideo" class="video-bg" loop playsinline></video>
<video id="mvView" class="video-fs" loop playsinline></video>
<div class="backlit-glow"></div>
<button id="exitBtn">CLOSE MV</button>

<div class="card" id="playerCard">
    <div class="headtitle">MUSICSPHERE</div>
    
    <div class="header">
        <button class="icon-nav" id="listToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    
    <div class="disk-wrapper" id="diskArea">
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200">
            <defs><path id="diskPath" d="M 100, 100 m -85, 0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"></path></defs>
            <text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">AWAITING MP4</textPath></text>
        </svg>
        <div class="hud-center">
            <div id="time-display">0:00</div>
        </div>
    </div>

    <canvas id="viz"></canvas>

    <label class="load-btn">LOAD MP4<input type="file" id="audIn" accept="video/mp4,video/x-m4v" multiple style="display:none"></label>

    <div class="vol-wrap" id="volHitbox">
        <div class="vol-track"><div class="vol-fill" id="vFil"></div></div>
    </div>

    <div class="controls">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="28" height="28" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
</div>

<script>
    const video = document.getElementById('masterVideo'), mvView = document.getElementById('mvView');
    const canvas = document.getElementById('viz'), ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const songLabel = document.getElementById('songLabel'), timeDisplay = document.getElementById('time-display');
    const playIcon = document.getElementById('playIcon'), vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox');
    const exitBtn = document.getElementById('exitBtn');

    let playlist = [], currentIndex = 0, audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0, pressTimer;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            const source = audioCtx.createMediaElementSource(video);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            requestAnimationFrame(renderLoop);
        }
    }

    function renderLoop() {
        if (!video.paused && !isDragging) { 
            rotation += 0.4; 
            cdAssembly.style.transform = `rotate(${rotation}deg)`;
            document.getElementById('curved-text-svg').style.transform = `rotate(${rotation - 90}deg)`;
        }

        if (analyser && !video.paused) {
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const numBars = 40, barW = 3, gap = (canvas.width - (numBars * barW)) / (numBars - 1), mid = (numBars - 1) / 2;
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            
            for (let i = 0; i < numBars; i++) {
                const x = (i - mid) / mid;
                const uCurve = Math.pow(x, 2); 
                const dataIndex = Math.floor((1 - Math.abs(x)) * 20);
                const finalH = Math.max(3, (dataArray[dataIndex] / 255) * canvas.height * (0.3 + uCurve * 0.7));
                ctx.beginPath();
                ctx.roundRect(i * (barW + gap), canvas.height - finalH, barW, finalH, 5);
                ctx.fill();
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function loadTrack(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const track = playlist[currentIndex];
        video.src = track.url;
        mvView.src = track.url;
        songLabel.textContent = track.name.toUpperCase();
        video.style.display = 'block';
        video.play().catch(()=>{});
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        initAudio();
    }

    // LONG PRESS LOGIC FOR MV
    cdAssembly.addEventListener('touchstart', (e) => {
        pressTimer = setTimeout(() => {
            if(!isDragging) {
                document.body.classList.add('is-zoomed');
                exitBtn.style.display = 'block';
                mvView.currentTime = video.currentTime;
                mvView.play();
                video.muted = true; // Avoid echo
            }
        }, 800);
    });

    cdAssembly.addEventListener('touchend', () => clearTimeout(pressTimer));

    exitBtn.onclick = () => {
        document.body.classList.remove('is-zoomed');
        exitBtn.style.display = 'none';
        video.currentTime = mvView.currentTime;
        video.muted = false;
        mvView.pause();
    };

    // DISK DRAGGING (SEEKING)
    function getAngle(e) {
        const r = cdAssembly.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI;
    }

    cdAssembly.addEventListener('mousedown', (e) => { isDragging = true; lastAngle = getAngle(e); video.pause(); timeDisplay.style.opacity = '1'; });
    window.addEventListener('mousemove', (e) => {
        if(!isDragging) return;
        const angle = getAngle(e);
        let delta = angle - lastAngle;
        if(delta > 180) delta -= 360; if(delta < -180) delta += 360;
        rotation += delta;
        cdAssembly.style.transform = `rotate(${rotation}deg)`;
        video.currentTime = Math.max(0, Math.min(video.duration - 0.1, video.currentTime + (delta * 0.1)));
        timeDisplay.textContent = Math.floor(video.currentTime/60) + ":" + String(Math.floor(video.currentTime%60)).padStart(2,'0');
        lastAngle = angle;
    });
    window.addEventListener('mouseup', () => { if(isDragging) { isDragging = false; video.play(); timeDisplay.style.opacity = '0'; } });

    document.getElementById('playBtn').onclick = () => {
        if(video.paused) { video.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
        else { video.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
    };

    document.getElementById('audIn').onchange = (e) => {
        Array.from(e.target.files).forEach(f => {
            playlist.push({ name: f.name.split('.')[0], url: URL.createObjectURL(f) });
        });
        if(playlist.length > 0) loadTrack(0);
    };

    // VOLUME
    volHitbox.onclick = (e) => {
        const r = volHitbox.getBoundingClientRect();
        const pr = (e.clientX - r.left) / r.width;
        vFil.style.width = (pr * 100) + '%';
        video.volume = pr; mvView.volume = pr;
    };

    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
