<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere Lunar Pro</title>
    <style>
        :root { --accent: #9400D3; --powder-white: rgba(240, 240, 255, 0.4); --bg: #020004; --disk-rot: 0deg; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            font-family: sans-serif; overflow: hidden; touch-action: none; 
        }

        .video-bg { position: absolute; inset: -5%; width: 110%; height: 110%; object-fit: cover; display: none; filter: blur(60px) brightness(0.2); z-index: 0; opacity: 0.4; pointer-events: none; }
        
        .card { 
            position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px;
            background: rgba(8, 4, 12, 0.95);
            border-radius: 50px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 100px rgba(0,0,0,1); overflow: hidden;
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        body.is-fullscreen .card { width: 100vw; height: 100vh; max-width: none; border-radius: 0; padding: 0; border: none; }
        body.is-fullscreen .card-video-overlay { background: rgba(0,0,0,0.1); }
        body.is-fullscreen .stagger { opacity: 0 !important; pointer-events: none; }

        .card-video-container { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; overflow: hidden; display: none; }
        .card-video-container video { width: 100%; height: 100%; object-fit: cover; }
        .card-video-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 3; }

        #exitFS {
            position: fixed; top: 40px; left: 30px; z-index: 2000;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(15px);
            font-size: 0.6rem; letter-spacing: 4px; font-weight: 900; cursor: pointer;
            opacity: 0; pointer-events: none; transition: opacity 0.4s;
        }
        body.is-fullscreen #exitFS { opacity: 1; pointer-events: auto; }

        /* LUNAR ECLIPSE GLOW */
        .disk-backglow {
            position: absolute; width: 260px; height: 260px;
            background: transparent;
            border-radius: 50%; z-index: 15;
            box-shadow: 0 0 50px 5px rgba(177, 156, 217, 0.4);
            pointer-events: none;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
            opacity: 0.2;
        }

        .headtitle {
            position: absolute; top: 45px; left: 35px;
            font-size: 0.7rem; font-weight: 900; letter-spacing: 8px; color: #fff;
            text-transform: uppercase; z-index: 25; opacity: 0.2;
        }

        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 45px; z-index: 20; padding-top: 10px; gap: 10px; }
        .icon-nav { background: none; border: none; cursor: pointer; opacity: 0.3; padding: 8px; transition: opacity 0.3s; }
        .icon-nav:hover { opacity: 0.8; }

        .stagger { transition: opacity 0.4s ease, transform 0.4s ease; }
        .card.is-stealth .stagger { opacity: 0 !important; pointer-events: none; transform: translateY(10px); }

        .disk-wrapper { 
            position: relative; width: 250px; height: 250px; flex-shrink: 0; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 20;
        }
        
        /* SMOKED TRANSPARENT DISK */
        #cdAssembly { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: rgba(10, 5, 20, 0.45);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08); cursor: grab; z-index: 17;
            transform: rotate(var(--disk-rot));
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }

        #curved-text-svg { position: absolute; inset: 0; pointer-events: none; z-index: 18; transform: rotate(calc(var(--disk-rot) - 90deg)); }
        .curved-title { font-size: 7px; font-weight: 900; fill: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 3px; }

        #time-display { position: absolute; z-index: 19; color: #fff; font-size: 1.6rem; opacity: 0; font-family: monospace; pointer-events: none; }

        canvas { width: 100%; height: 60px; margin-bottom: 20px; opacity: 0.5; z-index: 20; } 
        .load-btn { font-size: 0.55rem; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 30px; border-radius: 50px; cursor: pointer; margin-bottom: 20px; letter-spacing: 5px; z-index: 20; }
        
        .vol-wrap { width: 100%; padding: 5px 0; cursor: pointer; z-index: 40; margin-bottom: 10px; }
        .vol-track { height: 32px; background: rgba(255,255,255,0.02); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* POWDER WHITE SEMI-TRANSPARENT */
        .vol-fill { 
            height: 100%; 
            background: rgba(240, 240, 255, 0.15); 
            border-right: 1px solid rgba(255, 255, 255, 0.2); 
            width: 70%; pointer-events: none; 
        }
        
        .controls { display: flex; align-items: center; gap: 30px; margin-bottom: 10px; z-index: 30; }
        .icon-btn { background: none; border: none; width: 25px; height: 25px; fill: white; opacity: 0.4; cursor: pointer; }
        .play-btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.02); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.06); cursor: pointer; }

        #playlist-panel { 
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(80px) contrast(1.2) brightness(0.9); -webkit-backdrop-filter: blur(80px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px 40px 0 0; z-index: 1000; 
            transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px 20px; 
        }
        #playlist-panel.open { bottom: 0; }
        .track-item { padding: 18px; margin-bottom: 8px; border-radius: 15px; color: rgba(255,255,255,0.4); font-size: 0.8rem; background: rgba(255,255,255,0.03); cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<video id="bgVideo" class="video-bg" loop muted playsinline></video>
<button id="exitFS">EXIT</button>

<div class="card" id="playerCard">
    <div class="card-video-container" id="videoCont">
        <video id="mainVideo" loop playsinline></video>
        <div class="card-video-overlay"></div>
    </div>

    <div class="headtitle">MUSICSPHERE</div>
    
    <div class="header stagger">
        <button class="icon-nav" id="stealthToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button class="icon-nav" id="listToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    
    <div class="disk-wrapper stagger" id="diskArea">
        <div class="disk-backglow" id="glowPulse"></div>
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200">
            <defs><path id="diskPath" d="M 100, 100 m -85, 0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"></path></defs>
            <text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">INSERT MEDIA</textPath></text>
        </svg>
        <div id="time-display">0:00</div>
    </div>

    <canvas id="viz" class="stagger"></canvas>
    <label class="load-btn stagger">LOAD<input type="file" id="audIn" accept="audio/*,video/mp4" multiple style="display:none"></label>
    
    <div class="vol-wrap stagger" id="volHitbox"><div class="vol-track"><div class="vol-fill" id="vFil"></div></div></div>

    <div class="controls stagger">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="28" height="28" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>

    <div id="playlist-panel"><div id="track-list" style="overflow-y: auto;"></div></div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player'), mainVideo = document.getElementById('mainVideo'), bgVideo = document.getElementById('bgVideo');
    const videoCont = document.getElementById('videoCont'), exitFS = document.getElementById('exitFS'), canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly'), songLabel = document.getElementById('songLabel');
    const timeDisplay = document.getElementById('time-display'), glowPulse = document.getElementById('glowPulse'), playIcon = document.getElementById('playIcon');
    const vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox'), playlistPanel = document.getElementById('playlist-panel');
    const trackListUI = document.getElementById('track-list'), playerCard = document.getElementById('playerCard'), stealthToggle = document.getElementById('stealthToggle');

    let playlist = [], currentIndex = 0, audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0, wasPlaying = false, pressTimer, sX, sY;

    const getActive = () => playlist[currentIndex]?.type === 'video' ? mainVideo : audio;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; 
            const sA = audioCtx.createMediaElementSource(audio), sV = audioCtx.createMediaElementSource(mainVideo);
            sA.connect(analyser); sV.connect(analyser); analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            draw();
        }
    }

    function draw() {
        requestAnimationFrame(draw);
        const active = getActive();
        if (active && !active.paused && !isDragging) { 
            rotation += 0.25; document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`); 
        }
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let bSum = 0; for(let i=0; i<4; i++) bSum += dataArray[i];
            const bI = (bSum / 4) / 255;
            
            glowPulse.style.transform = `scale(${1 + (bI * 0.2)})`;
            glowPulse.style.opacity = 0.15 + (bI * 0.5);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const num = 10, gap = 8, bw = (canvas.width / 2 - (num * gap)) / num;
            for (let i = 0; i < num; i++) {
                let v = (dataArray[i] / 255) * canvas.height * (1 - (i/num)*0.7);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + (v/canvas.height)})`;
                ctx.beginPath(); ctx.roundRect(i * (bw + gap), canvas.height - v, bw, v, 10);
                ctx.roundRect(canvas.width - (i * (bw + gap)) - bw, canvas.height - v, bw, v, 10); ctx.fill();
            }
        }
    }

    function loadTrack(idx) {
        if (!playlist.length) return;
        currentIndex = (idx + playlist.length) % playlist.length;
        const track = playlist[currentIndex];
        audio.pause(); mainVideo.pause(); bgVideo.pause();
        songLabel.textContent = track.name.toUpperCase();
        if(track.type === 'video') {
            mainVideo.src = track.url; bgVideo.src = track.url;
            videoCont.style.display = 'block'; bgVideo.style.display = 'block';
        } else {
            audio.src = track.url; videoCont.style.display = 'none'; bgVideo.style.display = 'none';
            document.body.classList.remove('is-fullscreen');
        }
        const active = getActive(); active.play().catch(()=>{});
        if(track.type === 'video') bgVideo.play().catch(()=>{});
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    }

    function getAngle(e) {
        const r = cdAssembly.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI;
    }

    const startS = (e) => {
        const active = getActive(); if(!active.src) return;
        const p = e.touches ? e.touches[0] : e;
        sX = p.clientX; sY = p.clientY; isDragging = true; lastAngle = getAngle(e);
        wasPlaying = !active.paused; active.pause(); if(bgVideo.src) bgVideo.pause();
        timeDisplay.style.opacity = '1';
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            if (isDragging && playlist[currentIndex]?.type === 'video') {
                document.body.classList.add('is-fullscreen');
                isDragging = false; timeDisplay.style.opacity = '0';
            }
        }, 800);
    };

    const moveS = (e) => {
        if(!isDragging) return;
        const p = e.touches ? e.touches[0] : e;
        if(Math.hypot(p.clientX - sX, p.clientY - sY) > 5) clearTimeout(pressTimer);
        const active = getActive(); const angle = getAngle(e);
        let delta = angle - lastAngle; if(delta > 180) delta -= 360; if(delta < -180) delta += 360;
        rotation += delta; document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`);
        active.currentTime = Math.max(0, Math.min(active.duration - 0.1, active.currentTime + (delta * 0.15)));
        if(bgVideo.src) bgVideo.currentTime = active.currentTime;
        timeDisplay.textContent = Math.floor(active.currentTime/60) + ":" + String(Math.floor(active.currentTime%60)).padStart(2,'0');
        lastAngle = angle;
    };

    const endS = () => {
        clearTimeout(pressTimer); if(!isDragging) return;
        isDragging = false; timeDisplay.style.opacity = '0';
        if(wasPlaying) { getActive().play(); if(bgVideo.src) bgVideo.play(); }
    };

    exitFS.onclick = () => document.body.classList.remove('is-fullscreen');
    playerCard.onclick = () => playerCard.classList.remove('is-stealth');
    stealthToggle.onclick = (e) => { e.stopPropagation(); playerCard.classList.toggle('is-stealth'); };
    
    cdAssembly.addEventListener('mousedown', startS);
    window.addEventListener('mousemove', moveS);
    window.addEventListener('mouseup', endS);
    cdAssembly.addEventListener('touchstart', startS, {passive: false});
    window.addEventListener('touchmove', moveS, {passive: false});
    window.addEventListener('touchend', endS);

    document.getElementById('listToggle').onclick = (e) => { e.stopPropagation(); playlistPanel.classList.toggle('open'); };
    document.getElementById('playBtn').onclick = () => {
        initAudio(); const a = getActive();
        if(a.paused) { a.play(); if(bgVideo.src) bgVideo.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
        else { a.pause(); if(bgVideo.src) bgVideo.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
    };
    document.getElementById('nextBtn').onclick = () => loadTrack(currentIndex + 1);
    document.getElementById('prevBtn').onclick = () => loadTrack(currentIndex - 1);
    document.getElementById('audIn').onchange = (e) => {
        Array.from(e.target.files).forEach(f => {
            playlist.push({ name: f.name.split('.')[0], url: URL.createObjectURL(f), type: f.type.startsWith('video') ? 'video' : 'audio' });
        });
        if(playlist.length > 0) loadTrack(playlist.length - e.target.files.length);
        renderPlaylist();
    };

    function renderPlaylist() {
        trackListUI.innerHTML = "";
        playlist.forEach((t, i) => {
            const div = document.createElement('div'); div.className = 'track-item';
            div.textContent = (t.type === 'video' ? '🎬 ' : '🎵 ') + t.name;
            div.onclick = () => { loadTrack(i); playlistPanel.classList.remove('open'); };
            trackListUI.appendChild(div);
        });
    }

    function setV(e) {
        const r = volHitbox.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e;
        let pr = Math.max(0, Math.min(1, (p.clientX - r.left) / r.width));
        vFil.style.width = (pr * 100) + '%'; audio.volume = pr; mainVideo.volume = pr;
    }
    volHitbox.addEventListener('mousedown', (e) => { setV(e); window.onmousemove = setV; window.onmouseup = () => window.onmousemove = null; });
    volHitbox.addEventListener('touchstart', (e) => { setV(e); }, {passive: false});
    volHitbox.addEventListener('touchmove', (e) => { setV(e); }, {passive: false});
    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
