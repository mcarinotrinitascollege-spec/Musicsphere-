<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere Precision U</title>
    <style>
        :root { --accent: #9400D3; --bg: #05010a; --disk-rot: 0deg; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            font-family: sans-serif; overflow: hidden; touch-action: none; 
        }

        .video-bg { position: absolute; inset: -5%; width: 110%; height: 110%; object-fit: cover; display: none; filter: blur(40px) brightness(1.2); z-index: 0; opacity: 0.6; pointer-events: none; }
        .video-fs { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; opacity: 0; transition: opacity 0.8s ease; background: #000; }
        
        .backlit-glow { position: absolute; width: 400px; height: 550px; background: var(--accent); filter: blur(100px); opacity: 0.1; border-radius: 50%; z-index: 1; }

        .card { 
            position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px;
            background: rgba(15, 8, 25, 0.82); border-radius: 50px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); overflow: hidden;
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .headtitle {
            position: absolute; top: 45px; left: 30px;
            font-size: 0.65rem; font-weight: 900; letter-spacing: 6px; color: #fff;
            text-transform: uppercase; z-index: 25;
            animation: breathe 5s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.45; } }

        body.is-zoomed .card { width: 100vw; height: 100vh; max-width: none; border-radius: 0; background: #000; border: none; padding: 0; }
        body.is-zoomed .video-fs { display: block; opacity: 1; }
        body.is-zoomed .hide-on-zoom { opacity: 0 !important; pointer-events: none; visibility: hidden; }
        
        .stagger { transition: opacity 0.4s ease, transform 0.4s ease; }
        .is-stealth .stagger { opacity: 0 !important; pointer-events: none; transform: translateY(15px); }

        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 30px; z-index: 20; padding-top: 10px; gap: 10px; }
        .icon-nav { background: none; border: none; cursor: pointer; opacity: 0.35; padding: 8px; }
        #stealthToggle { display: none; align-items: center; justify-content: center; }

        .disk-wrapper { 
            position: relative; width: 240px; height: 240px; flex-shrink: 0; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center; z-index: 20;
        }
        #cdAssembly { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 75%);
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: grab; z-index: 5;
            transform: rotate(var(--disk-rot)); will-change: transform;
        }

        #curved-text-svg { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .curved-title { font-size: 6.5px; font-weight: 900; fill: rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 3px; }

        .hud-center { position: absolute; z-index: 12; pointer-events: none; text-align: center; }
        #time-display { color: #fff; font-size: 1.6rem; opacity: 0; font-family: monospace; text-shadow: 0 0 20px var(--accent); }

        /* FULL WIDTH VIZ */
        canvas { width: 100%; height: 90px; margin-bottom: 20px; opacity: 0.8; z-index: 20; } 

        .load-btn { font-size: 0.55rem; font-weight: 900; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 30px; border-radius: 50px; cursor: pointer; margin-bottom: 25px; letter-spacing: 4px; opacity: 0.6; }

        /* LIFTED CONTROLS */
        .vol-wrap { width: 100%; padding: 5px 0; cursor: pointer; z-index: 40; margin-bottom: 25px; }
        .vol-track { height: 26px; background: rgba(255,255,255,0.03); border-radius: 13px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); }
        .vol-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15)); border-right: 1.5px solid #fff; width: 70%; pointer-events: none; }
        
        .controls { display: flex; align-items: center; gap: 35px; margin-bottom: 30px; z-index: 30; }
        .icon-btn { background: none; border: none; width: 25px; height: 25px; fill: white; opacity: 0.3; cursor: pointer; }
        .play-btn { width: 55px; height: 55px; background: rgba(255, 255, 255, 0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; }

        #playlist-panel { 
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(50px) brightness(1.1); 
            -webkit-backdrop-filter: blur(50px) brightness(1.1);
            border-top: 1px solid rgba(255, 255, 255, 0.15); border-radius: 40px 40px 0 0; z-index: 1000; 
            transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px 20px; 
        }
        #playlist-panel.open { bottom: 0; }
        .track-item { padding: 18px; margin-bottom: 8px; border-radius: 15px; color: rgba(255,255,255,0.4); font-size: 0.75rem; background: rgba(255,255,255,0.02); cursor: pointer; border: 1px solid rgba(255,255,255,0.03); }
        .track-item.active { background: rgba(255,255,255,0.1); color: #fff; }

        #exitBtn { 
            position: fixed; top: 40px; left: 30px; z-index: 3000; display: none; padding: 12px 25px; border-radius: 30px; 
            background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); 
            cursor: pointer; font-size: 0.65rem; letter-spacing: 2px; font-weight: 900;
        }
    </style>
</head>
<body>

<video id="bgVideo" class="video-bg" loop muted playsinline></video>
<video id="fsVideo" class="video-fs" loop muted playsinline></video>
<div class="backlit-glow"></div>
<button id="exitBtn">RETURN</button>

<div class="card" id="playerCard">
    <div class="headtitle stagger hide-on-zoom">MUSICSPHERE</div>
    
    <div class="header stagger hide-on-zoom">
        <button class="icon-nav" id="stealthToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button class="icon-nav" id="listToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    
    <div class="disk-wrapper stagger hide-on-zoom" id="diskArea">
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200">
            <defs><path id="diskPath" d="M 100, 100 m -85, 0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"></path></defs>
            <text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">AWAITING INPUT</textPath></text>
        </svg>
        <div class="hud-center">
            <div id="time-display">0:00</div>
        </div>
    </div>

    <canvas id="viz" class="stagger hide-on-zoom"></canvas>

    <label class="load-btn stagger hide-on-zoom">INSERT<input type="file" id="audIn" accept="audio/*,video/mp4" multiple style="display:none"></label>

    <div class="vol-wrap stagger hide-on-zoom" id="volHitbox">
        <div class="vol-track"><div class="vol-fill" id="vFil"></div></div>
    </div>

    <div class="controls stagger hide-on-zoom">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="28" height="28" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>

    <div id="playlist-panel">
        <div id="track-list" style="overflow-y: auto;"></div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player'), fsVideo = document.getElementById('fsVideo'), bgVideo = document.getElementById('bgVideo');
    const canvas = document.getElementById('viz'), ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const songLabel = document.getElementById('songLabel'), timeDisplay = document.getElementById('time-display');
    const playIcon = document.getElementById('playIcon'), vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox');
    const playlistPanel = document.getElementById('playlist-panel'), trackListUI = document.getElementById('track-list');
    const playerCard = document.getElementById('playerCard'), exitBtn = document.getElementById('exitBtn'), stealthBtn = document.getElementById('stealthToggle');

    let playlist = [], currentIndex = 0, audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0, wasPlaying = false, pressTimer;

    const getActive = () => playlist[currentIndex]?.type === 'video' ? fsVideo : audio;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128; 
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            requestAnimationFrame(renderLoop);
        }
    }

    function renderLoop() {
        const active = getActive();
        if (!active.paused && !isDragging) { 
            rotation += 0.3; 
            cdAssembly.style.transform = `rotate(${rotation}deg)`;
            document.getElementById('curved-text-svg').style.transform = `rotate(${rotation - 90}deg)`;
        }

        if (analyser && !active.paused) {
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const numBars = 35; 
            const barW = 3; 
            const gap = (canvas.width - (numBars * barW)) / (numBars - 1);
            const mid = (numBars - 1) / 2;
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
            
            for (let i = 0; i < numBars; i++) {
                // Parabolic U-Shape Math: height increases as we move away from center
                const x = (i - mid) / mid; // ranges from -1 to 1
                const uCurve = Math.pow(x, 2); // 1.0 at edges, 0.0 at center
                
                // Map frequency data (lower indices are bass)
                // We map bass frequencies to the edges
                const dataIndex = Math.floor((1 - Math.abs(x)) * 15);
                const baseVal = (dataArray[dataIndex] / 255) * canvas.height;
                
                // Force a minimum valley height + the U-Curve boost
                const finalH = Math.max(2, baseVal * (0.2 + (uCurve * 0.8)));
                
                ctx.beginPath();
                ctx.roundRect(i * (barW + gap), canvas.height - finalH, barW, finalH, 10);
                ctx.fill();
            }
        }
        requestAnimationFrame(renderLoop);
    }

    function renderPlaylist() {
        trackListUI.innerHTML = "";
        playlist.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `track-item ${i === currentIndex ? 'active' : ''}`;
            div.textContent = t.name;
            div.onclick = (ev) => { ev.stopPropagation(); loadTrack(i); playlistPanel.classList.remove('open'); };
            trackListUI.appendChild(div);
        });
    }

    function loadTrack(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const track = playlist[currentIndex];
        audio.pause(); fsVideo.pause();
        const active = getActive();
        songLabel.textContent = track.name.toUpperCase();
        active.src = track.url;
        
        if(track.type === 'video') { 
            bgVideo.src = track.url; bgVideo.style.display = 'block'; bgVideo.play();
            stealthBtn.style.display = 'flex'; 
        } else { 
            bgVideo.style.display = 'none'; stealthBtn.style.display = 'none';
            playerCard.classList.remove('is-stealth');
        }
        active.play().catch(()=>{});
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        renderPlaylist();
        initAudio();
    }

    function getAngle(e) {
        const r = cdAssembly.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI;
    }

    const startS = (e) => {
        const active = getActive(); if(!active.src) return;
        isDragging = true; lastAngle = getAngle(e);
        wasPlaying = !active.paused; active.pause();
        timeDisplay.style.opacity = '1';
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            if(isDragging && playlist[currentIndex]?.type === 'video' && !playerCard.classList.contains('is-stealth')) {
                document.body.classList.add('is-zoomed');
                exitBtn.style.display = 'block';
            }
        }, 800);
    };

    const moveS = (e) => {
        if(!isDragging) return;
        const active = getActive();
        const angle = getAngle(e);
        let delta = angle - lastAngle;
        if(delta > 180) delta -= 360; if(delta < -180) delta += 360;
        rotation += delta;
        cdAssembly.style.transform = `rotate(${rotation}deg)`;
        document.getElementById('curved-text-svg').style.transform = `rotate(${rotation - 90}deg)`;
        active.currentTime = Math.max(0, Math.min(active.duration - 0.1, active.currentTime + (delta * 0.15)));
        timeDisplay.textContent = Math.floor(active.currentTime/60) + ":" + String(Math.floor(active.currentTime%60)).padStart(2,'0');
        lastAngle = angle;
    };

    const endS = () => { if(isDragging) { isDragging = false; clearTimeout(pressTimer); timeDisplay.style.opacity = '0'; if(wasPlaying) getActive().play(); } };

    playerCard.addEventListener('click', () => { if (playerCard.classList.contains('is-stealth')) playerCard.classList.remove('is-stealth'); });

    cdAssembly.addEventListener('mousedown', startS);
    window.addEventListener('mousemove', moveS);
    window.addEventListener('mouseup', endS);
    cdAssembly.addEventListener('touchstart', startS, {passive: false});
    window.addEventListener('touchmove', moveS, {passive: false});
    window.addEventListener('touchend', endS);

    exitBtn.onclick = (e) => { e.stopPropagation(); document.body.classList.remove('is-zoomed'); exitBtn.style.display = 'none'; };
    stealthBtn.onclick = (e) => { e.stopPropagation(); playerCard.classList.toggle('is-stealth'); };
    document.getElementById('listToggle').onclick = (e) => { e.stopPropagation(); playlistPanel.classList.toggle('open'); };
    document.getElementById('playBtn').onclick = (e) => { e.stopPropagation(); initAudio(); const a = getActive(); if(a.paused) { a.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; } else { a.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; } };
    document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex + 1); };
    document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex - 1); };

    document.getElementById('audIn').onchange = (e) => {
        Array.from(e.target.files).forEach(f => {
            playlist.push({ name: f.name.split('.')[0], url: URL.createObjectURL(f), type: f.type.startsWith('video') ? 'video' : 'audio' });
        });
        if(playlist.length > 0) loadTrack(playlist.length - e.target.files.length);
        renderPlaylist();
    };

    function setV(e) {
        const r = volHitbox.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        let pr = Math.max(0, Math.min(1, (p.clientX - r.left) / r.width));
        vFil.style.width = (pr * 100) + '%';
        audio.volume = pr; fsVideo.volume = pr;
    }
    volHitbox.addEventListener('mousedown', (e) => { e.stopPropagation(); setV(e); window.onmousemove = setV; window.onmouseup = () => window.onmousemove = null; });
    volHitbox.addEventListener('touchstart', (e) => { e.stopPropagation(); setV(e); }, {passive: false});
    volHitbox.addEventListener('touchmove', (e) => { e.stopPropagation(); setV(e); }, {passive: false});

    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
