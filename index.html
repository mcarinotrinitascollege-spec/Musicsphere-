<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Musicsphere Autoplay</title>
<style>
:root { --accent: #9400D3; --bg: #030008; --disk-rot: 0deg; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body, html { width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; touch-action: none; }
.backlit-glow { position: absolute; width: 400px; height: 550px; background: var(--accent); filter: blur(100px); opacity: 0.15; border-radius: 50%; z-index: 1; }

.video-bg { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; display:none; filter: blur(20px) brightness(0.4); z-index:0; }

/* The base video card - no dimming here, we handle it in the tint layer */
.video-card { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; display:none; filter: brightness(1); z-index:2; border-radius:50px; pointer-events:none; }

.card { position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 650px; background: #0a0514; border-radius: 50px; padding: 20px 25px; display: flex; flex-direction: column; align-items: center; border: 1.5px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 50px rgba(0,0,0,0.9); overflow: hidden; }

/* *** NEW: The Global Tint Layer *** */
/* Sits at Z: 3, above video (2) and below visualizer (11) and controls (15+) */
.global-tint { position: absolute; inset: 0; background: rgba(10, 5, 20, 0.7); /* Base dimming */ mix-blend-mode: multiply; /* Blends the purple into the video shadows */ z-index: 3; pointer-events: none; }
.global-tint::before { content: ""; position: absolute; inset: 0; background: rgba(148, 0, 211, 0.25); /* The purple tint */ mix-blend-mode: color; /* Specifically tints the video colors */ }

.header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; z-index: 15; }
.headtitle { font-size: 0.75rem; font-weight: 900; letter-spacing: 5px; color: #fff; text-transform: uppercase; animation: purpleBreath 4s ease-in-out infinite; }
@keyframes purpleBreath { 0%,100%{opacity:0.3;text-shadow:0 0 0px var(--accent);}50%{opacity:0.8;text-shadow:0 0 15px var(--accent);} }

.list-toggle { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; padding: 8px; display: flex; }

/* Disk and HUD wrapper - Z: 15 to stay on top of the tint */
.disk-wrapper { position: relative; width: 260px; height: 260px; flex-shrink: 0; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; z-index: 15; }

/* We removed the .center-dimmer class */

#cdAssembly { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(148,0,211,0.1) 0%,transparent 75%); border:2px solid rgba(255,255,255,0.08); cursor:grab; z-index:16; transform:rotate(var(--disk-rot)); will-change: transform; }
#curved-text-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 17; transform: rotate(calc(var(--disk-rot) - 90deg)); }
.curved-title { font-size: 8px; font-weight: 900; fill: rgba(255,255,255,0.7); /* Slightly brighter for contrast against tinted video */ text-transform: uppercase; letter-spacing: 3px; }
.hud-center { position: absolute; z-index: 18; pointer-events: none; text-align: center; }
#track-counter { color:#fff;font-size:1.2rem;font-weight:900;opacity:0.4;letter-spacing:2px; }
#time-display { position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.5rem;opacity:0;transition:opacity 0.2s;font-family:monospace; }

/* Visualizer at Z: 11, above the tint */
canvas { width: 100%; height: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 8px rgba(148,0,211,0.6)); opacity:0.8; z-index: 11; }
.controls { display:flex;align-items:center;gap:35px;margin-bottom:20px;z-index:20; }
.icon-btn { background:none;border:none;width:30px;height:30px;fill:white;opacity:0.35;cursor:pointer; }
.play-btn { width:65px;height:65px;background:rgba(148,0,211,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;filter: drop-shadow(0 0 12px rgba(148,0,211,0.5)) drop-shadow(0 0 1px #fff);cursor:pointer; }

.vol-wrap { width:100%; padding:10px 0; cursor:pointer; z-index:30; touch-action: none; position: relative; }
.vol-track { height:35px; background: rgba(255,255,255,0.03); border-radius:18px; position:relative; overflow:hidden; border:1px solid rgba(255,255,255,0.06);}
.vol-fill { position:absolute; left:0; top:0; height:100%; background: linear-gradient(to right, transparent, rgba(148,0,211,0.5)); border-right:2.5px solid #fff; width:80%; pointer-events:none; }

.load-btn { font-size:0.6rem;color:#fff;border:1px solid rgba(255,255,255,0.1);padding:12px 30px;border-radius:30px;cursor:pointer;margin-top:auto;opacity:0.3;letter-spacing:2px; z-index: 20; width: 100%; text-align: center;}
#playlist-panel { position:absolute;bottom:-100%;left:0;width:100%;height:85%;background:rgba(10,5,20,0.98);backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,0.15);border-radius:40px 40px 0 0; z-index:1000; transition: bottom 0.4s cubic-bezier(0.16,1,0.3,1); padding:30px 20px; display:flex; flex-direction:column; }
#playlist-panel.open { bottom:0; }
.track-item { padding:18px; margin-bottom:10px; border-radius:15px; color:rgba(255,255,255,0.4); font-size:0.8rem; background: rgba(255,255,255,0.02); cursor:pointer; }
.track-item.active { background: rgba(148,0,211,0.2); color:white; border:1px solid var(--accent); }
</style>
</head>
<body onclick="initAudio()">

<video id="bgVideo" class="video-bg" loop muted></video>

<div class="card">
    <video id="cardVideo" class="video-card" loop playsinline></video>
    
    <div class="global-tint"></div>

    <div class="backlit-glow" id="bgGlow"></div>
    
    <div class="header">
        <div class="headtitle">MUSICSPHERE</div>
        <button class="list-toggle" id="listToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
    </div>

    <div class="disk-wrapper">
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200"><defs><path id="diskPath" d="M100,100 m-85,0 a85,85 0 1,1 170,0 a85,85 0 1,1 -170,0"></path></defs><text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">AWAITING INPUT</textPath></text></svg>
        <div class="hud-center"><div id="track-counter">0 / 0</div><div id="time-display">0:00</div></div>
    </div>

    <canvas id="viz"></canvas>

    <div class="controls">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="30" height="30" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>

    <div class="vol-wrap" id="volHitbox"><div class="vol-track"><div class="vol-fill" id="vFil"></div></div></div>

    <label class="load-btn">ADD MEDIA<input type="file" id="mediaIn" accept="audio/*,video/mp4" multiple style="display:none"></label>

    <div id="playlist-panel">
        <div id="track-list" style="overflow-y: auto;"></div>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
// Logic remains identical to your working version, just ensuring 
// the video elements play unmuted and synchronize with volume.

const audio=document.getElementById('player'), bgVideo=document.getElementById('bgVideo'), cardVideo=document.getElementById('cardVideo');
const canvas=document.getElementById('viz'), ctx=canvas.getContext('2d'), vFil=document.getElementById('vFil');
const cdAssembly=document.getElementById('cdAssembly'), songLabel=document.getElementById('songLabel'), trackCounter=document.getElementById('track-counter');
const timeDisplay=document.getElementById('time-display'), playIcon=document.getElementById('playIcon'), volHitbox=document.getElementById('volHitbox');
const bgGlow=document.getElementById('bgGlow'), playlistPanel=document.getElementById('playlist-panel'), trackListUI=document.getElementById('track-list');

let playlist=[], currentIndex=0, audioCtx, analyser, dataArray, rotation=0, isDragging=false, lastAngle=0, currentVol=0.8, isVolDragging=false;

async function initAudio(){
    if(!audioCtx){
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        analyser=audioCtx.createAnalyser();
        analyser.fftSize=64;
        dataArray=new Uint8Array(analyser.frequencyBinCount);
        const aSrc = audioCtx.createMediaElementSource(audio);
        const vSrc = audioCtx.createMediaElementSource(cardVideo);
        aSrc.connect(analyser); vSrc.connect(analyser);
        analyser.connect(audioCtx.destination);
        draw();
    }
}

function loadTrack(index){
    if(!playlist.length) return;
    currentIndex=index;
    const track=playlist[currentIndex];
    trackCounter.textContent=`${currentIndex+1} / ${playlist.length}`;
    songLabel.textContent=track.name.toUpperCase();
    
    audio.pause(); audio.src="";
    cardVideo.pause(); cardVideo.src="";
    bgVideo.pause(); bgVideo.src="";

    if(track.type==='video'){
        cardVideo.src=track.url; bgVideo.src=track.url;
        cardVideo.style.display='block'; bgVideo.style.display='block';
        // Apply volume to video
        cardVideo.volume = currentVol;
        cardVideo.play().catch(()=>{});
        bgVideo.play().catch(()=>{});
    } else {
        cardVideo.style.display='none'; bgVideo.style.display='none';
        audio.src=track.url;
        // Apply volume to audio
        audio.volume = currentVol;
        audio.play().catch(()=>{});
    }
    playIcon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    updateUI();
}

function updateUI(){
    trackListUI.innerHTML='';
    playlist.forEach((t,i)=>{
        const div=document.createElement('div');
        div.className=`track-item ${i===currentIndex?'active':''}`;
        div.textContent=t.name;
        div.onclick=()=>{loadTrack(i); playlistPanel.classList.remove('open');};
        trackListUI.appendChild(div);
    });
}

function draw(){
    requestAnimationFrame(draw);
    const m = (playlist[currentIndex]?.type === 'video') ? cardVideo : audio;
    if(!m.paused && !isDragging){
        rotation+=0.2; document.documentElement.style.setProperty('--disk-rot',`${rotation}deg`);
    }
    if(analyser){
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#fff";
        // Slightly dimmer glow sensitivity for tinted background
        bgGlow.style.opacity=0.03 + (dataArray[0]/255 * (0.25 * currentVol));
        for(let i=0; i<8; i++){
            let h=(dataArray[i]/255)*canvas.height;
            ctx.beginPath();
            ctx.roundRect(i*20,canvas.height-h,12,h,10);
            ctx.roundRect(canvas.width-(i*20)-12,canvas.height-h,12,h,10);
            ctx.fill();
        }
    }
}

// SCRUBBING
const getAngle=e=>{const r=cdAssembly.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-(r.left+r.width/2);const y=(e.touches?e.touches[0].clientY:e.clientY)-(r.top+r.height/2);return Math.atan2(y,x)*180/Math.PI;};
const startS=e=>{
    const m = (playlist[currentIndex]?.type === 'video') ? cardVideo : audio;
    if(!m.src) return; 
    isDragging=true; lastAngle=getAngle(e); m.pause(); bgVideo.pause();
    trackCounter.style.opacity='0'; timeDisplay.style.opacity='1';
};
const moveS=e=>{
    if(!isDragging) return;
    const m = (playlist[currentIndex]?.type === 'video') ? cardVideo : audio;
    const angle=getAngle(e); let delta=angle-lastAngle;
    if(delta>180)delta-=360; if(delta<-180)delta+=360;
    rotation+=delta; document.documentElement.style.setProperty('--disk-rot',`${rotation}deg`);
    m.currentTime = Math.max(0, Math.min(m.duration, m.currentTime + (delta*0.1)));
    bgVideo.currentTime = m.currentTime;
    timeDisplay.textContent=Math.floor(m.currentTime/60)+':'+String(Math.floor(m.currentTime%60)).padStart(2,'0');
    lastAngle=angle;
};
const endS=()=>{
    if(!isDragging) return; isDragging=false;
    const m = (playlist[currentIndex]?.type === 'video') ? cardVideo : audio;
    timeDisplay.style.opacity='0'; trackCounter.style.opacity='0.4'; m.play(); if(playlist[currentIndex].type==='video') bgVideo.play();
};

cdAssembly.addEventListener('mousedown',startS); window.addEventListener('mousemove',moveS); window.addEventListener('mouseup',endS);
cdAssembly.addEventListener('touchstart',startS); window.addEventListener('touchmove',moveS); window.addEventListener('touchend',endS);

// VOLUME SLIDER (Unified Audio/Video)
const updateVolume = e => {
    const rect = volHitbox.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const p = Math.max(0, Math.min(1, x / rect.width));
    currentVol = p;
    vFil.style.width = (p * 100) + '%';
    // Update both sources simultaneously
    audio.volume = p;
    cardVideo.volume = p;
};

volHitbox.addEventListener('mousedown', e => { isVolDragging = true; updateVolume(e); });
volHitbox.addEventListener('touchstart', e => { isVolDragging = true; updateVolume(e); });
window.addEventListener('mousemove', e => { if(isVolDragging) updateVolume(e); });
window.addEventListener('touchmove', e => { if(isVolDragging) updateVolume(e); });
window.addEventListener('mouseup', () => isVolDragging = false);
window.addEventListener('touchend', () => isVolDragging = false);

// CONTROLS
document.getElementById('playBtn').onclick=()=>{
    initAudio();
    const m = (playlist[currentIndex]?.type === 'video') ? cardVideo : audio;
    if(m.paused){ m.play(); if(playlist[currentIndex].type==='video') bgVideo.play(); playIcon.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
    else { m.pause(); bgVideo.pause(); playIcon.innerHTML='<path d="M8 5v14l11-7z"/>'; }
};
document.getElementById('nextBtn').onclick=()=>loadTrack((currentIndex+1)%playlist.length);
document.getElementById('prevBtn').onclick=()=>loadTrack((currentIndex-1+playlist.length)%playlist.length);
document.getElementById('listToggle').onclick=()=>playlistPanel.classList.toggle('open');

document.getElementById('mediaIn').onchange=e=>{
    Array.from(e.target.files).forEach(f=>{
        const type = f.type.startsWith('video') ? 'video' : 'audio';
        playlist.push({name:f.name, url:URL.createObjectURL(f), type: type});
    });
    if(playlist.length > 0 && !audio.src && !cardVideo.src) loadTrack(0);
    else updateUI();
};

audio.onended=()=>document.getElementById('nextBtn').click();
cardVideo.onended=()=>document.getElementById('nextBtn').click();
</script>
</body>
</html>
