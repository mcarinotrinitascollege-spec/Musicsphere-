<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere Fixed Interaction</title>
    <style>
        :root { 
            --accent: #9400D3; 
            --powder-purple: #DCD0FF; 
            --bg: #0a0212; 
            --disk-rot: 0deg; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; 
        }

        /* Decorative only - NO interaction */
        .backlit-glow { 
            position: absolute; width: 500px; height: 650px; 
            background: var(--accent); filter: blur(130px); opacity: 0.18; 
            border-radius: 50%; z-index: 1; pointer-events: none; 
        }

        .card { 
            position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px;
            background: rgba(20, 10, 35, 0.95); border-radius: 50px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 100px rgba(0,0,0,0.95); overflow: hidden;
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
        }

        .headtitle {
            position: absolute; top: 40px; left: 35px;
            font-size: 0.7rem; font-weight: 900; letter-spacing: 0.5em; color: #fff;
            text-transform: uppercase; z-index: 5; pointer-events: none;
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.9; text-shadow: 0 0 15px var(--accent); }
        }

        /* High Z-Index for Header Buttons */
        .header { 
            width: 100%; display: flex; justify-content: flex-end; 
            align-items: center; margin-bottom: 45px; z-index: 150; 
            position: relative; gap: 8px; 
        }
        .icon-nav { 
            background: none; border: none; cursor: pointer; 
            opacity: 0.45; padding: 10px; transition: 0.3s; color: white;
            pointer-events: auto;
        }

        .disk-wrapper { 
            position: relative; width: 250px; height: 250px; flex-shrink: 0; 
            margin-bottom: 30px; display: flex; align-items: center; 
            justify-content: center; z-index: 20; 
        }
        #cdAssembly { 
            position: absolute; inset: 0; border-radius: 50%; 
            background: radial-gradient(circle, rgba(148, 0, 211, 0.15) 0%, rgba(255,255,255,0.05) 100%);
            border: 2px solid rgba(255, 255, 255, 0.2); cursor: grab; z-index: 21;
            transform: rotate(var(--disk-rot));
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
        }

        canvas { width: 100%; height: 50px; margin-bottom: 25px; opacity: 0.6; z-index: 5; pointer-events: none; } 
        
        /* The Pill - Elevated Z-Index */
        .subtle-add { 
            display: flex; align-items: center; justify-content: center;
            width: 72px; height: 32px; border-radius: 20px;
            border: 1.5px solid var(--powder-purple);
            color: var(--powder-purple); font-size: 1.2rem; cursor: pointer; 
            transition: all 0.3s ease; z-index: 150; margin-bottom: 25px;
            background: rgba(220, 208, 255, 0.08);
            position: relative; pointer-events: auto;
        }

        .vol-wrap { width: 100%; padding: 5px 0; cursor: pointer; z-index: 150; margin-bottom: 20px; position: relative; }
        .vol-track { height: 32px; background: rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; border: 1.5px solid rgba(255, 255, 255, 0.15); pointer-events: none; }
        .vol-fill { height: 100%; background: linear-gradient(to right, rgba(148, 0, 211, 0.2), rgba(148, 0, 211, 0.6)); border-right: 3px solid #fff; width: 70%; }
        
        /* Controls Group - Elevated Z-Index */
        .controls { 
            display: flex; align-items: center; gap: 40px; 
            margin-bottom: 20px; z-index: 150; position: relative; 
        }
        .icon-btn, .play-btn { 
            background: none; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto;
        }
        .icon-btn { fill: white; opacity: 0.45; transition: 0.2s; }
        .play-btn { width: 64px; height: 64px; transition: transform 0.2s; }

        #playlist-panel { 
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 85%; 
            background: rgba(15, 5, 25, 0.99); backdrop-filter: blur(50px);
            border-top: 1.5px solid rgba(255, 255, 255, 0.15); border-radius: 40px 40px 0 0; z-index: 1000; 
            transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px 20px; 
        }
        #playlist-panel.open { bottom: 0; }

        /* Stealth Toggle Stability */
        .stagger { transition: opacity 0.5s ease, transform 0.5s ease; }
        .card.is-stealth .stagger { opacity: 0 !important; pointer-events: none; }
        #stealthToggle.active { opacity: 1; color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
    </style>
</head>
<body>

<div class="backlit-glow"></div>

<div class="card" id="playerCard">
    <div class="headtitle">MUSICSPHERE</div>

    <div class="header">
        <button class="icon-nav" id="stealthToggle" title="Stealth Mode">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="icon-nav" id="listToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </div>
    
    <div class="disk-wrapper" id="diskArea">
        <div id="cdAssembly"></div>
    </div>

    <canvas id="viz" class="stagger"></canvas>
    
    <label class="subtle-add stagger">
        ＋
        <input type="file" id="audIn" accept="audio/*" multiple style="display:none">
    </label>
    
    <div class="vol-wrap stagger" id="volHitbox">
        <div class="vol-track"><div class="vol-fill" id="vFil"></div></div>
    </div>

    <div class="controls stagger">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="white"/></svg></button>
        <button class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="40" height="40" fill="white"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" fill="white"/></svg></button>
    </div>

    <div id="playlist-panel"><div id="track-list"></div></div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player'), canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox');
    const playerCard = document.getElementById('playerCard'), stealthToggle = document.getElementById('stealthToggle');
    const playIcon = document.getElementById('playIcon');

    let audioCtx, analyser, dataArray;

    // Fixed Toggle: e.stopPropagation prevents the card or other layers from stealing the click
    stealthToggle.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        playerCard.classList.toggle('is-stealth');
        stealthToggle.classList.toggle('active');
    };

    document.getElementById('playBtn').onclick = (e) => {
        e.stopPropagation();
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser(); 
            analyser.fftSize = 64; 
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser); 
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            draw();
        }
        if(audio.paused) { 
            audio.play(); 
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; 
        } else { 
            audio.pause(); 
            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; 
        }
    };

    document.getElementById('audIn').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            audio.src = URL.createObjectURL(file);
            audio.play();
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        }
    };

    function setVolume(e) {
        const rect = volHitbox.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const percent = Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
        vFil.style.width = (percent * 100) + '%';
        audio.volume = percent;
    }

    volHitbox.addEventListener('mousedown', (e) => {
        setVolume(e);
        const move = (ev) => setVolume(ev);
        const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
    });

    function draw() {
        requestAnimationFrame(draw);
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let bSum = 0; for(let i=0; i<4; i++) bSum += dataArray[i];
            const bI = (bSum / 4) / 255;
            cdAssembly.style.boxShadow = `inset 0 0 60px rgba(0,0,0,0.8), 0 0 ${10 + (bI * 40)}px rgba(148, 0, 211, ${0.1 + (bI * 0.4)})`;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const num = 15, gap = 4, bw = (canvas.width / 2 - (num * gap)) / num;
            for (let i = 0; i < num; i++) {
                let v = (dataArray[i] / 255) * canvas.height * 0.8;
                ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + (v/100)})`;
                ctx.fillRect(i * (bw + gap), canvas.height - v, bw, v);
                ctx.fillRect(canvas.width - (i * (bw + gap)) - bw, canvas.height - v, bw, v);
            }
        }
    }

    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
