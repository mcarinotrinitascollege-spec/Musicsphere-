<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musicsphere Pro Optimized</title>
    <style>
        :root { --accent: #9400D3; --powder-purple: #DCD0FF; --bg: #05010a; --disk-rot: 0deg; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            font-family: sans-serif; overflow: hidden; touch-action: none; 
        }

        /* Fullscreen & Background Blurs */
        .video-bg { position: absolute; inset: -5%; width: 110%; height: 110%; object-fit: cover; display: none; filter: blur(60px) brightness(0.4); z-index: 0; opacity: 0.4; pointer-events: none; }
        .video-fs { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; opacity: 0; transition: opacity 0.8s ease; background: #000; }
        
        .backlit-glow { position: absolute; width: 400px; height: 550px; background: var(--accent); filter: blur(100px); opacity: 0.15; border-radius: 50%; z-index: 1; pointer-events: none; }

        .card { 
            position: relative; z-index: 10; width: 92vw; max-width: 380px; height: 680px;
            background: rgba(15, 8, 25, 0.95); border-radius: 50px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center; 
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); overflow: hidden;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Video TINT - Layered between Video and UI */
        .card-tint { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.65); 
            z-index: 3; pointer-events: none; 
        }

        /* Internal Video - Locked to back */
        #internalVideo { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 2; display: none; pointer-events: none;
        }

        .headtitle {
            position: absolute; top: 45px; left: 30px;
            font-size: 0.75rem; font-weight: 900; letter-spacing: 6px; color: #fff;
            text-transform: uppercase; z-index: 25; opacity: 0.5;
        }

        body.is-zoomed .card { width: 100vw; height: 100vh; max-width: none; border-radius: 0; background: #000; border: none; padding: 0; }
        body.is-zoomed .video-fs { display: block; opacity: 1; }
        body.is-zoomed .hide-on-zoom { opacity: 0 !important; pointer-events: none; }
        
        /* UI Elements - Guaranteed to be above video */
        .stagger { transition: opacity 0.4s ease, transform 0.4s ease; z-index: 30; position: relative; }
        .is-stealth .stagger { opacity: 0 !important; pointer-events: none; transform: translateY(15px); }

        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 45px; padding-top: 10px; gap: 10px; z-index: 100; }
        .icon-nav { background: none; border: none; cursor: pointer; opacity: 0.6; color: white; padding: 10px; }

        .disk-wrapper { position: relative; width: 250px; height: 250px; flex-shrink: 0; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; z-index: 40; }
        #cdAssembly { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 75%);
            border: 2px solid rgba(255, 255, 255, 0.2); cursor: grab; z-index: 41;
            transform: rotate(var(--disk-rot));
            transition: box-shadow 0.08s ease;
        }

        #curved-text-svg { position: absolute; inset: 0; pointer-events: none; z-index: 42; transform: rotate(calc(var(--disk-rot) - 90deg)); }
        .curved-title { font-size: 7px; font-weight: 900; fill: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 3px; }

        .hud-center { position: absolute; z-index: 43; pointer-events: none; text-align: center; }
        #time-display { color: #fff; font-size: 1.6rem; opacity: 0; font-family: monospace; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        canvas { width: 100%; height: 60px; margin-bottom: 20px; opacity: 0.8; z-index: 30; } 

        .load-btn { 
            font-size: 0.6rem; font-weight: 900; color: var(--powder-purple); 
            border: 1.5px solid var(--powder-purple); padding: 10px 30px; 
            border-radius: 50px; cursor: pointer; margin-bottom: 20px; 
            letter-spacing: 4px; background: rgba(220, 208, 255, 0.05); z-index: 100;
        }

        .vol-wrap { width: 100%; padding: 5px 0; cursor: pointer; margin-bottom: 25px; z-index: 100; }
        .vol-track { height: 32px; background: rgba(255,255,255,0.1); border-radius: 16px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .vol-fill { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(to right, transparent, rgba(148, 0, 211, 0.4)); border-right: 2px solid #fff; width: 70%; pointer-events: none; }
        
        .controls { display: flex; align-items: center; gap: 35px; margin-bottom: 10px; z-index: 100; }
        .icon-btn { background: none; border: none; width: 28px; height: 28px; fill: white; opacity: 0.5; cursor: pointer; }
        .play-btn { background: none; border: none; width: 60px; height: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #exitBtn { 
            position: fixed; top: 40px; left: 30px; z-index: 3000; display: none; 
            padding: 12px 25px; border-radius: 30px; background: rgba(0,0,0,0.85); 
            color: white; border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
        }
    </style>
</head>
<body>

<video id="bgVideo" class="video-bg" loop muted playsinline></video>
<video id="fsVideo" class="video-fs" loop playsinline></video>
<div class="backlit-glow"></div>
<button id="exitBtn">RETURN</button>

<div class="card" id="playerCard">
    <video id="internalVideo" loop playsinline muted></video>
    <div class="card-tint"></div>
    
    <div class="headtitle stagger hide-on-zoom">MUSICSPHERE</div>
    
    <div class="header stagger hide-on-zoom">
        <button class="icon-nav" id="stealthToggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button class="icon-nav" id="listToggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
    </div>
    
    <div class="disk-wrapper stagger hide-on-zoom" id="diskArea">
        <div id="cdAssembly"></div>
        <svg id="curved-text-svg" viewBox="0 0 200 200">
            <defs><path id="diskPath" d="M 100, 100 m -85, 0 a 85,85 0 1,1 170,0 a 85,85 0 1,1 -170,0"></path></defs>
            <text class="curved-title"><textPath id="songLabel" xlink:href="#diskPath" startOffset="50%" text-anchor="middle">AWAITING INPUT</textPath></text>
        </svg>
        <div class="hud-center">
            <div id="time-display">0:00</div>
        </div>
    </div>

    <canvas id="viz" class="stagger hide-on-zoom"></canvas>

    <label class="load-btn stagger hide-on-zoom">INSERT<input type="file" id="audIn" accept="audio/*,video/mp4" multiple style="display:none"></label>

    <div class="vol-wrap stagger hide-on-zoom" id="volHitbox">
        <div class="vol-track"><div class="vol-fill" id="vFil"></div></div>
    </div>

    <div class="controls stagger hide-on-zoom">
        <button class="icon-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <div class="play-btn" id="playBtn"><svg viewBox="0 0 24 24" id="playIcon" width="30" height="30" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
        <button class="icon-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
</div>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('player'), fsVideo = document.getElementById('fsVideo'), bgVideo = document.getElementById('bgVideo');
    const internalVideo = document.getElementById('internalVideo'), canvas = document.getElementById('viz');
    const ctx = canvas.getContext('2d'), cdAssembly = document.getElementById('cdAssembly');
    const songLabel = document.getElementById('songLabel'), timeDisplay = document.getElementById('time-display');
    const playIcon = document.getElementById('playIcon'), vFil = document.getElementById('vFil'), volHitbox = document.getElementById('volHitbox');
    const playerCard = document.getElementById('playerCard'), exitBtn = document.getElementById('exitBtn'), stealthToggle = document.getElementById('stealthToggle');

    let playlist = [], currentIndex = 0, audioCtx, analyser, dataArray, rotation = 0, isDragging = false, lastAngle = 0, wasPlaying = false, pressTimer;

    const getActive = () => playlist[currentIndex]?.type === 'video' ? internalVideo : audio;

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; 
            const vSrc = audioCtx.createMediaElementSource(internalVideo);
            const aSrc = audioCtx.createMediaElementSource(audio);
            const fSrc = audioCtx.createMediaElementSource(fsVideo);
            vSrc.connect(analyser); aSrc.connect(analyser); fSrc.connect(analyser);
            analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            draw();
        }
    }

    function draw() {
        requestAnimationFrame(draw);
        const active = getActive();
        if (active.src && !active.paused && !isDragging) { 
            rotation += 0.25; document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`); 
        }
        if (analyser && !active.paused) {
            analyser.getByteFrequencyData(dataArray);
            let bass = (dataArray[0] + dataArray[1] + dataArray[2]) / 3;
            let intensity = (bass / 255);
            cdAssembly.style.boxShadow = `0 0 ${intensity * 30}px rgba(220, 208, 255, ${intensity * 0.7})`;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const num = 10, gap = 8, bw = (canvas.width/2 - (num*gap))/num;
            for (let i = 0; i < num; i++) {
                let v = (dataArray[i]/255) * canvas.height * (1 - (i/num)*0.7);
                ctx.fillStyle = `rgba(255,255,255,${0.2 + (v/canvas.height)})`;
                ctx.beginPath();
                ctx.roundRect(i*(bw+gap), canvas.height-v, bw, v, 10);
                ctx.roundRect(canvas.width-(i*(bw+gap))-bw, canvas.height-v, bw, v, 10);
                ctx.fill();
            }
        }
    }

    function loadTrack(index) {
        if (!playlist.length) return;
        currentIndex = (index + playlist.length) % playlist.length;
        const track = playlist[currentIndex];
        
        [audio, internalVideo, fsVideo, bgVideo].forEach(el => { el.pause(); el.src = ""; });
        const active = getActive();
        songLabel.textContent = track.name.toUpperCase();
        
        if(track.type === 'video') {
            internalVideo.src = track.url; fsVideo.src = track.url; bgVideo.src = track.url;
            internalVideo.style.display = 'block'; bgVideo.style.display = 'block';
            internalVideo.muted = false; // Enable sound
            internalVideo.play().catch(e => console.log("Video Play Blocked"));
            bgVideo.play();
        } else {
            audio.src = track.url; internalVideo.style.display = 'none'; bgVideo.style.display = 'none';
            audio.play().catch(e => console.log("Audio Play Blocked"));
        }
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    }

    // NEXT / PREV BUTTONS
    document.getElementById('nextBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex + 1); };
    document.getElementById('prevBtn').onclick = (e) => { e.stopPropagation(); loadTrack(currentIndex - 1); };

    function getAngle(e) {
        const r = cdAssembly.getBoundingClientRect(), p = e.touches ? e.touches[0] : e;
        return Math.atan2(p.clientY-(r.top+r.height/2), p.clientX-(r.left+r.width/2)) * 180 / Math.PI;
    }

    const startS = (e) => {
        const active = getActive(); if(!active.src || playerCard.classList.contains('is-stealth')) return;
        isDragging = false; lastAngle = getAngle(e); wasPlaying = !active.paused;
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
            if(!isDragging && playlist[currentIndex]?.type === 'video') {
                document.body.classList.add('is-zoomed');
                exitBtn.style.display = 'block';
            }
        }, 800);
    };

    const moveS = (e) => {
        const active = getActive(); if(!active.src || playerCard.classList.contains('is-stealth')) return;
        const angle = getAngle(e);
        let delta = angle - lastAngle;
        if(Math.abs(delta) > 1.5) { 
            isDragging = true; clearTimeout(pressTimer); active.pause();
            timeDisplay.style.opacity = '1';
        }
        if(isDragging) {
            if(delta > 180) delta -= 360; if(delta < -180) delta += 360;
            rotation += delta;
            document.documentElement.style.setProperty('--disk-rot', `${rotation}deg`);
            active.currentTime = Math.max(0, Math.min(active.duration - 0.1, active.currentTime + (delta * 0.15)));
            timeDisplay.textContent = Math.floor(active.currentTime/60) + ":" + String(Math.floor(active.currentTime%60)).padStart(2,'0');
            lastAngle = angle;
        }
    };

    const endS = () => { clearTimeout(pressTimer); timeDisplay.style.opacity = '0'; if(isDragging && wasPlaying) getActive().play(); isDragging = false; };

    cdAssembly.addEventListener('mousedown', startS);
    window.addEventListener('mousemove', moveS);
    window.addEventListener('mouseup', endS);
    cdAssembly.addEventListener('touchstart', startS, {passive: false});
    window.addEventListener('touchmove', moveS, {passive: false});
    window.addEventListener('touchend', endS);

    document.getElementById('playBtn').onclick = (e) => {
        e.stopPropagation(); initAudio(); const a = getActive();
        if(a.paused) { a.play(); playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; }
        else { a.pause(); playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; }
    };

    stealthToggle.onclick = (e) => { e.stopPropagation(); playerCard.classList.toggle('is-stealth'); };
    exitBtn.onclick = (e) => { e.stopPropagation(); document.body.classList.remove('is-zoomed'); exitBtn.style.display = 'none'; };
    playerCard.onclick = () => { if(playerCard.classList.contains('is-stealth')) playerCard.classList.remove('is-stealth'); };

    document.getElementById('audIn').onchange = (e) => {
        Array.from(e.target.files).forEach(f => {
            playlist.push({ name: f.name.split('.')[0], url: URL.createObjectURL(f), type: f.type.startsWith('video') ? 'video' : 'audio' });
        });
        if(playlist.length > 0) loadTrack(playlist.length - e.target.files.length);
    };

    window.onresize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    window.onresize();
</script>
</body>
</html>
